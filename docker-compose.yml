# ============================================================
#  Lernumgebung Fachinformatiker - docker compose
#  Alle Zugangsdaten kommen aus der Datei .env
# ============================================================

services:

  # ----------------------------------------------------------
  #  Datenbank (MariaDB)
  # ----------------------------------------------------------
  db:
    image: mariadb:11
    container_name: train-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      # Daten bleiben auch nach "down" erhalten
      - db_data:/var/lib/mysql
      # Alle .sql-Dateien hier werden beim ERSTEN Start automatisch ausgeführt
      - ./sql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------
  #  PHP 8.4 + Apache
  #  Webroot: ./php/www  ->  http://localhost:8080
  # ----------------------------------------------------------
  php:
    build: ./php
    container_name: train-php
    restart: unless-stopped
    ports:
      - "${PHP_PORT}:80"
    volumes:
      - ./php/www:/var/www/html
      # Anwendungscode + Tests getrennt vom Webroot (saubere Nahtstellen)
      - ./php/src:/var/www/src
      - ./php/tests:/var/www/tests
      - ./php/phpunit.xml:/var/www/phpunit.xml
      - ./php/phpstan.neon:/var/www/phpstan.neon
    environment:
      DB_HOST: db
      DB_NAME: ${MARIADB_DATABASE}
      DB_USER: ${MARIADB_USER}
      DB_PASS: ${MARIADB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------------------------
  #  Python (Flask)
  #  Code: ./python/app  ->  http://localhost:8001
  # ----------------------------------------------------------
  python:
    build: ./python
    container_name: train-python
    restart: unless-stopped
    ports:
      - "${PYTHON_PORT}:8000"
    volumes:
      - ./python/app:/app
      - ./python/tests:/app/tests
    environment:
      DB_HOST: db
      DB_NAME: ${MARIADB_DATABASE}
      DB_USER: ${MARIADB_USER}
      DB_PASS: ${MARIADB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------------------------
  #  Node.js (Express)
  #  Code: ./node/app  ->  http://localhost:3000
  # ----------------------------------------------------------
  node:
    build: ./node
    container_name: train-node
    restart: unless-stopped
    ports:
      - "${NODE_PORT}:3000"
    volumes:
      - ./node/app:/app
      - ./node/tests:/app/tests
      # node_modules bleiben im Container (nicht vom Host überschrieben)
      - /app/node_modules
    environment:
      DB_HOST: db
      DB_NAME: ${MARIADB_DATABASE}
      DB_USER: ${MARIADB_USER}
      DB_PASS: ${MARIADB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------------------------
  #  phpMyAdmin  ->  http://localhost:8081
  # ----------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin:5
    container_name: train-phpmyadmin
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------------------------
  #  NocoDB  ->  http://localhost:8090
  #  Schickes Daten-Tool (Airtable-artig). Liest das Schema
  #  der MariaDB automatisch ein. Metadaten in eigenem Volume.
  #  Verbindung zur DB einmalig in der Web-UI anlegen
  #  (Werte siehe README, Abschnitt NocoDB).
  # ----------------------------------------------------------
  nocodb:
    image: nocodb/nocodb:latest
    container_name: train-nocodb
    restart: unless-stopped
    ports:
      - "${NOCODB_PORT}:8080"
    environment:
      # Erlaubt die Verbindung zur MariaDB im internen Docker-Netz
      # (Host "db"). Ohne dies blockt NocoDBs SSRF-Schutz mit
      # "Connection to internal host is not allowed".
      NC_ALLOW_LOCAL_EXTERNAL_DBS: "true"
    volumes:
      - nocodb_data:/usr/app/data
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------------------------
  #  Vue 3 (Vite + nginx)
  #  Code: ./vue  ->  http://localhost:5173
  #  Kleines Bewerbungs-Formular, kann zur Laufzeit jedes der
  #  vier Backends (PHP/Python/Node/.NET) ansprechen.
  # ----------------------------------------------------------
  vue:
    build: ./vue
    container_name: train-vue
    restart: unless-stopped
    ports:
      - "${VUE_PORT}:80"

  # ----------------------------------------------------------
  #  .NET 9 (ASP.NET Core Minimal API)
  #  Code: ./dotnet  ->  http://localhost:8082
  # ----------------------------------------------------------
  dotnet:
    build: ./dotnet
    container_name: train-dotnet
    restart: unless-stopped
    ports:
      - "${DOTNET_PORT}:8080"
    volumes:
      - ./dotnet:/work
    environment:
      DB_HOST: db
      DB_NAME: ${MARIADB_DATABASE}
      DB_USER: ${MARIADB_USER}
      DB_PASS: ${MARIADB_PASSWORD}
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      NUGET_PACKAGES: /nuget-packages
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------------------------
  #  Java 21 (Spring Boot)
  #  Code: ./java  ->  http://localhost:8083
  # ----------------------------------------------------------
  java:
    build: ./java
    container_name: train-java
    restart: unless-stopped
    ports:
      - "${JAVA_PORT}:8080"
    volumes:
      - ./java:/work
    environment:
      DB_HOST: db
      DB_NAME: ${MARIADB_DATABASE}
      DB_USER: ${MARIADB_USER}
      DB_PASS: ${MARIADB_PASSWORD}
      # Maven-Cache AUSSERHALB des Bind-Mount (/work) -> ueberdauert Builds.
      MAVEN_OPTS: "-Dmaven.repo.local=/maven-cache"
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------------------------
  #  Kotlin 2 (Ktor)
  #  Code: ./kotlin  ->  http://localhost:8084
  # ----------------------------------------------------------
  kotlin:
    build: ./kotlin
    container_name: train-kotlin
    restart: unless-stopped
    ports:
      - "${KOTLIN_PORT}:8080"
    volumes:
      - ./kotlin:/work
    environment:
      DB_HOST: db
      DB_NAME: ${MARIADB_DATABASE}
      DB_USER: ${MARIADB_USER}
      DB_PASS: ${MARIADB_PASSWORD}
      MAVEN_OPTS: "-Dmaven.repo.local=/maven-cache"
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------------------------
  #  Go 1.23 (chi-Router + database/sql)
  #  Code: ./go  ->  http://localhost:8085
  # ----------------------------------------------------------
  go:
    build: ./go
    container_name: train-go
    restart: unless-stopped
    ports:
      - "${GO_PORT}:8080"
    volumes:
      - ./go:/work
    environment:
      DB_HOST: db
      DB_NAME: ${MARIADB_DATABASE}
      DB_USER: ${MARIADB_USER}
      DB_PASS: ${MARIADB_PASSWORD}
      # Modul- und Build-Cache AUSSERHALB des Bind-Mount.
      GOPATH: /go-cache
      GOCACHE: /go-build-cache
      GOFLAGS: -mod=mod
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------------------------
  #  Tools (git + curl) fuer Teilnehmer ohne lokale Tools
  #  Permanent laufender Mini-Container. Aufruf ueber die
  #  Wrapper-Skripte in ./tools (siehe README, Abschnitt
  #  "Werkzeuge ohne Installation").
  # ----------------------------------------------------------
  tools:
    build: ./tools
    container_name: train-tools
    restart: unless-stopped
    working_dir: /work
    volumes:
      # Komplettes Projekt in den Container, damit "git status"
      # & Co. die Arbeitskopie der Teilnehmer sehen.
      - .:/work
      # /root persistent halten: hier landen .gitconfig-Eintraege,
      # gespeicherte HTTPS-Credentials, known_hosts usw.
      - tools_home:/root
    environment:
      # Werden bei jedem Commit als Autor/Committer verwendet.
      # In der .env eintragen, siehe .env.example.
      GIT_AUTHOR_NAME: ${GIT_USER_NAME:-Teilnehmer}
      GIT_AUTHOR_EMAIL: ${GIT_USER_EMAIL:-teilnehmer@example.local}
      GIT_COMMITTER_NAME: ${GIT_USER_NAME:-Teilnehmer}
      GIT_COMMITTER_EMAIL: ${GIT_USER_EMAIL:-teilnehmer@example.local}
    extra_hosts:
      # Damit "curl http://localhost:8080" im Container den Host
      # erreicht (siehe tools/curl-rewrite.sh).
      - "host.docker.internal:host-gateway"

  # ----------------------------------------------------------
  #  Ruby 3.3 (Sinatra)
  #  Code: ./ruby  ->  http://localhost:8086
  # ----------------------------------------------------------
  ruby:
    build: ./ruby
    container_name: train-ruby
    restart: unless-stopped
    ports:
      - "${RUBY_PORT}:8080"
    volumes:
      - ./ruby:/app
    environment:
      DB_HOST: db
      DB_NAME: ${MARIADB_DATABASE}
      DB_USER: ${MARIADB_USER}
      DB_PASS: ${MARIADB_PASSWORD}
      # Bundle-Cache AUSSERHALB des Bind-Mount.
      BUNDLE_PATH: /bundle-cache
      BUNDLE_BIN: /bundle-cache/bin
      PATH: /bundle-cache/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  nocodb_data:
  tools_home:
